<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Max Color Distance Generator</title>
    </head>
    <body>
        <h1>Max Color Distance Generator</h1>

        <div class="controls controls-main">
            <div class="field">
                <label for="count">Count</label>
                <input type="number" id="count" min="1" value="32" />
            </div>
            <div class="field">
                <label>Text</label>
                <div class="layout-switcher">
                    <button id="text-black-btn" class="layout-btn">Black</button>
                    <button id="text-white-btn" class="layout-btn active">White</button>
                </div>
            </div>
            <div class="field">
                <label for="min-contrast">Min contrast</label>
                <input
                    type="number"
                    id="min-contrast"
                    min="1"
                    max="21"
                    step="0.1"
                    value="3.5"
                />
            </div>
            <div class="field">
                <label for="strategy">Strategy</label>
                <select id="strategy">
                    <option value="0">Naive distance</option>
                    <option value="1">OKLab chroma filter</option>
                    <option value="2" selected>HSL sampling</option>
                    <option value="3">OKLCH sampling</option>
                    <option value="4">Chroma-biased selection</option>
                </select>
            </div>
            <button id="generate-btn" class="btn">Generate (space)</button>
        </div>

        <div class="main-layout">
            <div class="output-area">
                <div id="output" class="swatches"></div>
            </div>

            <aside class="sidebar">
                <div class="view-controls">
                    <div class="layout-switcher">
                        <button id="layout-grid-btn" class="layout-btn active">Grid</button>
                        <button id="layout-bar-btn" class="layout-btn">Bars</button>
                    </div>
                    <button id="sort-hue-btn" class="btn btn-secondary" disabled>Sort by similarity</button>
                </div>
                <div class="sidebar-history">
                    <span class="history-label">Last 10 palettes</span>
                    <span id="seed-history"></span>
                </div>
                <div class="output-actions">
                    <button id="copy-all-btn" class="btn btn-secondary" disabled>Copy hex</button>
                    <button id="copy-svg-btn" class="btn btn-secondary" disabled>Copy SVG</button>
                </div>
            </aside>
        </div>

        <script type="module" src="./main.js"></script>
    </body>
</html>
